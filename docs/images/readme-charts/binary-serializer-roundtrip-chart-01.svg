<text class="title" x="56" y="72">Binary Serializer Round-Trip Latency</text><text class="subtitle" x="58" y="104" font-size="18">Round-trip latency by payload size</text><rect x="56" y="116" width="18" height="18" rx="5" fill="#8ecae6"/><text class="legend" x="82" y="131">Small</text><rect x="156" y="116" width="18" height="18" rx="5" fill="#b8e0d2"/><text class="legend" x="182" y="131">Medium</text><rect x="266" y="116" width="18" height="18" rx="5" fill="#ffb3c7"/><text class="legend" x="292" y="131">Large</text><text class="label" x="56" y="185">Fory</text><rect x="285" y="142" width="7.582169233617378" height="18" rx="7" fill="#8ecae6"/><text class="value" x="302.5821692336174" y="157" font-size="16">0.849 us/op</text><rect x="285" y="166" width="17.781035269884796" height="18" rx="7" fill="#b8e0d2"/><text class="value" x="312.7810352698848" y="181" font-size="16">1.99 us/op</text><rect x="285" y="190" width="78.17939867030213" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="373.17939867030213" y="205" font-size="16">8.75 us/op</text><text class="label" x="56" y="283">Kryo</text><rect x="285" y="240" width="32.829274561575346" height="18" rx="7" fill="#8ecae6"/><text class="value" x="327.82927456157535" y="255" font-size="16">3.68 us/op</text><rect x="285" y="264" width="61.85406844762542" height="18" rx="7" fill="#b8e0d2"/><text class="value" x="356.8540684476254" y="279" font-size="16">6.93 us/op</text><rect x="285" y="288" width="257.5704862977136" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="552.5704862977136" y="303" font-size="16">28.8 us/op</text><text class="label" x="56" y="381">MessagePack</text><rect x="285" y="338" width="37.91084616808689" height="18" rx="7" fill="#8ecae6"/><text class="value" x="332.9108461680869" y="353" font-size="16">4.25 us/op</text><rect x="285" y="362" width="101.53319436630858" height="18" rx="7" fill="#b8e0d2"/><text class="value" x="396.5331943663086" y="377" font-size="16">11.4 us/op</text><rect x=