<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
<style>
.title{font-family:'Architects Daughter','Comic Sans MS','Comic Neue',cursive;font-size:34px;font-weight:400;fill:#273043}
.subtitle,.axis,.legend,.note{font-family:'Comic Sans MS','Comic Neue','Chalkboard SE',cursive;fill:#6b7280;font-weight:400}
.label{font-family:'Comic Sans MS','Comic Neue','Chalkboard SE',cursive;fill:#273043;font-weight:400}
.value{font-family:'Comic Sans MS','Comic Neue','Chalkboard SE',cursive;fill:#273043;font-weight:400;font-size:18px}
.axis{font-size:16px}.legend{font-size:18px}.note{font-size:17px}.label{font-size:18px}
</style>
<rect width="1280" height="560" rx="0" fill="#f6f8fb"/>
<rect x="24" y="24" width="1232" height="512" rx="18" fill="#ffffff" stroke="#d7e3ee" stroke-width="2"/>
<text class="title" x="56" y="72">Serializer + Compressor Round-Trip</text><text class="subtitle" x="58" y="104" font-size="18">Practical top combinations across payload sizes</text><rect x="56" y="116" width="18" height="18" rx="5" fill="#8ecae6"/><text class="legend" x="82" y="131">Small</text><rect x="156" y="116" width="18" height="18" rx="5" fill="#b8e0d2"/><text class="legend" x="182" y="131">Medium</text><rect x="266" y="116" width="18" height="18" rx="5" fill="#ffb3c7"/><text class="legend" x="292" y="131">Large</text><text class="label" x="56" y="185">Fory</text><rect x="285" y="142" width="20.863724514313162" height="18" rx="7" fill="#8ecae6"/><text class="value" x="315.86372451431316" y="157" font-size="16">0.734 us/op</text><rect x="285" y="166" width="54.5469854808814" height="18" rx="7" fill="#b8e0d2"/><text class="value" x="349.5469854808814" y="181" font-size="16">1.92 us/op</text><rect x="285" y="190" width="265.7708776687032" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="560.7708776687032" y="205" font-size="16">9.35 us/op</text><text class="label" x="56" y="283">Fory + Snappy</text><rect x="285" y="240" width="45.13841216448134" height="18" rx="7" fill="#8ecae6"/><text class="value" x="340.13841216448134" y="255" font-size="16">1.59 us/op</text><rect x="285" y="264" width="96.41655797350177" height="18" rx="7" fill="#b8e0d2"/><text class="value" x="391.41655797350177" y="279" font-size="16">3.39 us/op</text><rect x="285" y="288" width="453.20330198393617" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="748.2033019839362" y="303" font-size="16">15.9 us/op</text><text class="label" x="56" y="381">Fory + LZ4</text><rect x="285" y="338" width="52.614106370563604" height="18" rx="7" fill="#8ecae6"/><text class="value" x="347.6141063705636" y="353" font-size="16">1.85 us/op</text><rect x="285" y="362" width="108.38335364179306" height="18" rx="7" fill="#b8e0d2"/><text class="value" x="403.38335364179306" y="377" font-size="16">3.81 us/op</text><rect x="285" y="386" width="427.5073796938284" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="722.5073796938284" y="401" font-size="16">15.0 us/op</text><text class="label" x="56" y="479">Kryo</text><rect x="285" y="436" width="84.1655153772225" height="18" rx="7" fill="#8ecae6"/><text class="value" x="379.1655153772225" y="451" font-size="16">2.96 us/op</text><rect x="285" y="460" width="171.25877411272052" height="18" rx="7" fill="#b8e0d2"/><text class="value" x="466.2587741127205" y="475" font-size="16">6.03 us/op</text><rect x="285" y="484" width="709.8214285714286" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="1004.8214285714286" y="499" font-size="16">25.0 us/op</text><text class="note" x="56" y="520">Lower is better. Compression improves size, but plain Fory remains fastest.</text></svg>
