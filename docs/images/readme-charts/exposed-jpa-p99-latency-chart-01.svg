<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520">
<style>
.title{font-family:'Architects Daughter','Comic Sans MS','Comic Neue',cursive;font-size:34px;font-weight:400;fill:#273043}
.subtitle,.axis,.legend,.note{font-family:'Comic Sans MS','Comic Neue','Chalkboard SE',cursive;fill:#6b7280;font-weight:400}
.label{font-family:'Comic Sans MS','Comic Neue','Chalkboard SE',cursive;fill:#273043;font-weight:400}
.value{font-family:'Comic Sans MS','Comic Neue','Chalkboard SE',cursive;fill:#273043;font-weight:400;font-size:18px}
.axis{font-size:16px}.legend{font-size:18px}.note{font-size:17px}.label{font-size:18px}
</style>
<rect width="1280" height="520" rx="0" fill="#f6f8fb"/>
<rect x="24" y="24" width="1232" height="472" rx="18" fill="#ffffff" stroke="#d7e3ee" stroke-width="2"/>
<text class="title" x="56" y="72">Exposed vs JPA API Latency</text><text class="subtitle" x="58" y="104" font-size="18">Gatling p99 latency on PostgreSQL API endpoints</text><rect x="56" y="116" width="18" height="18" rx="5" fill="#8ecae6"/><text class="legend" x="82" y="131">Exposed</text><rect x="176" y="116" width="18" height="18" rx="5" fill="#ffb3c7"/><text class="legend" x="202" y="131">JPA</text><text class="label" x="56" y="173">POST /persons</text><rect x="285" y="142" width="642.2193877551019" height="18" rx="7" fill="#8ecae6"/><text class="value" x="937.2193877551019" y="157" font-size="16">19 ms p99</text><rect x="285" y="166" width="574.6173469387754" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="869.6173469387754" y="181" font-size="16">17 ms p99</text><text class="label" x="56" y="247">GET /persons/{id}</text><rect x="285" y="216" width="439.4132653061224" height="18" rx="7" fill="#8ecae6"/><text class="value" x="734.4132653061224" y="231" font-size="16">13 ms p99</text><rect x="285" y="240" width="405.61224489795904" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="700.612244897959" y="255" font-size="16">12 ms p99</text><text class="label" x="56" y="321">PUT /persons/{id}</text><rect x="285" y="290" width="507.0153061224489" height="18" rx="7" fill="#8ecae6"/><text class="value" x="802.0153061224489" y="305" font-size="16">15 ms p99</text><rect x="285" y="314" width="540.8163265306122" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="835.8163265306122" y="329" font-size="16">16 ms p99</text><text class="label" x="56" y="395">DELETE /persons/{id}</text><rect x="285" y="364" width="439.4132653061224" height="18" rx="7" fill="#8ecae6"/><text class="value" x="734.4132653061224" y="379" font-size="16">13 ms p99</text><rect x="285" y="388" width="709.8214285714286" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="1004.8214285714286" y="403" font-size="16">21 ms p99</text><text class="label" x="56" y="469">GET /persons</text><rect x="285" y="438" width="371.8112244897959" height="18" rx="7" fill="#8ecae6"/><text class="value" x="666.8112244897959" y="453" font-size="16">11 ms p99</text><rect x="285" y="462" width="405.61224489795904" height="18" rx="7" fill="#ffb3c7"/><text class="value" x="700.612244897959" y="477" font-size="16">12 ms p99</text><text class="note" x="56" y="480">Lower is better; bars show p99 latency.</text></svg>
