version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: lettuce-near-demo-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3
